schemaVersion: "2.2"
description: "Install Amazon Corretto (JDK/JVM) and Apache Tomcat on the web app EC2 instance."
parameters:
  correttoVersion:
    type: String
    description: "Amazon Corretto major version to install (provides the JDK and JVM)."
    default: "17"
  tomcatVersion:
    type: String
    # Tomcat 9.x is the last line on the javax.servlet namespace; the app uses
    # javax.* so it is incompatible with Tomcat 10+ (jakarta.* namespace).
    description: "Apache Tomcat version to install."
    default: "9.0.109"
mainSteps:
  - action: "aws:runShellScript"
    name: "installJavaAndTomcat"
    inputs:
      runCommand:
        - "set -euo pipefail"
        - "CORRETTO_VERSION='{{ correttoVersion }}'"
        - "TOMCAT_VERSION='{{ tomcatVersion }}'"
        - "TOMCAT_MAJOR=\"${TOMCAT_VERSION%%.*}\""
        - "# Amazon Corretto ships the JDK, which includes the HotSpot JVM"
        - "dnf install -y \"java-${CORRETTO_VERSION}-amazon-corretto-devel\" tar"
        - "java -version"
        - "# Dedicated, unprivileged service account for Tomcat"
        - "id tomcat &>/dev/null || useradd -r -m -U -d /opt/tomcat -s /sbin/nologin tomcat"
        - "# Idempotent re-install: stop any running Tomcat and clear CATALINA_HOME"
        - "# so we never overlay a new release on top of stale jars (e.g. v10 -> v9)."
        - "systemctl stop tomcat 2>/dev/null || true"
        - "rm -rf /opt/tomcat/*"
        - "install -d -o tomcat -g tomcat /opt/tomcat"
        - "TARBALL=\"apache-tomcat-${TOMCAT_VERSION}.tar.gz\""
        - "REL_PATH=\"tomcat/tomcat-${TOMCAT_MAJOR}/v${TOMCAT_VERSION}/bin/${TARBALL}\""
        - "# dlcdn only hosts current releases; archive permanently retains every version as a fallback"
        - "curl -fsSL -o \"/tmp/${TARBALL}\" \"https://dlcdn.apache.org/${REL_PATH}\" || curl -fsSL -o \"/tmp/${TARBALL}\" \"https://archive.apache.org/dist/${REL_PATH}\""
        - "tar -xzf \"/tmp/${TARBALL}\" -C /opt/tomcat --strip-components=1"
        - "chown -R tomcat:tomcat /opt/tomcat"
        - "chmod +x /opt/tomcat/bin/*.sh"
        - "JAVA_HOME=\"$(dirname \"$(dirname \"$(readlink -f \"$(command -v java)\")\")\")\""
        - "cat > /etc/systemd/system/tomcat.service <<EOF"
        - "[Unit]"
        - "Description=Apache Tomcat"
        - "After=network.target"
        - ""
        - "[Service]"
        - "Type=forking"
        - "User=tomcat"
        - "Group=tomcat"
        - "Environment=JAVA_HOME=${JAVA_HOME}"
        - "Environment=CATALINA_HOME=/opt/tomcat"
        - "Environment=CATALINA_BASE=/opt/tomcat"
        - "Environment=CATALINA_PID=/opt/tomcat/temp/tomcat.pid"
        - "ExecStart=/opt/tomcat/bin/startup.sh"
        - "ExecStop=/opt/tomcat/bin/shutdown.sh"
        - "Restart=on-failure"
        - ""
        - "[Install]"
        - "WantedBy=multi-user.target"
        - "EOF"
        - "systemctl daemon-reload"
        - "systemctl enable --now tomcat"
        - "systemctl --no-pager status tomcat"
